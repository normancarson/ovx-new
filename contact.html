<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | OVX</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>
<main id="main-content">
  <section class="page-hero"><div class="container"><h1>Get In Touch</h1><p>Our Kigali office is ready to assist you.</p></div></section>
  <section>
    <div class="container">
      <div class="form-card" style="max-width:600px; margin: 0 auto;">
        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="cd78c4b9-c2fe-487c-87bc-4532b27a96af">
          
          <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required placeholder="Your full name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Your email">
          </div>
          <div class="form-group">
            <label>How can we help?</label>
            <select name="subject">
                <option value="Job Inquiry">Job Inquiry (No Degree)</option>
                <option value="Shipping">Global Shipping</option>
                <option value="Real Estate">Real Estate in Rwanda</option>
                <option value="General">General Question</option>
            </select>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Send Message</button>
        </form>
      </div>
    </div>
  </section>
</main>
<footer id="site-footer"></footer>
<script src="js/main.js"></script>
</body>
</html>
